name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build
        run: ./gradlew build --stacktrace
        continue-on-error: true

      - name: Inspect Gui and Hud classes
        run: |
          JAR=$(find ~/.gradle/caches/fabric-loom -path "*minecraft-merged-deobf*.jar" 2>/dev/null | head -n 1)
          echo "Using jar: $JAR"

          echo ""
          echo "--- net.minecraft.client.gui.Gui ---"
          javap -p -classpath "$JAR" net.minecraft.client.gui.Gui | grep -i -E "hide|hidden|render|gui"

          echo ""
          echo "--- net.minecraft.client.gui.Hud ---"
          javap -p -classpath "$JAR" net.minecraft.client.gui.Hud | grep -i -E "hide|hidden|render"

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: villager-reroll-jar
          path: build/libs/*.jar
