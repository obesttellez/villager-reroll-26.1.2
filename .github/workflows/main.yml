name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build
        run: ./gradlew build --stacktrace
        continue-on-error: true

      - name: Inspect Options and Gui classes
        run: |
          echo "--- Locating Options.class ---"
          OPTIONS_JAR=$(find ~/.gradle/caches/fabric-loom -name "*.jar" 2>/dev/null | xargs -I{} sh -c 'unzip -l "{}" 2>/dev/null | grep -q "net/minecraft/client/Options.class" && echo {}' | head -n 1)
          echo "Found in: $OPTIONS_JAR"
          if [ -n "$OPTIONS_JAR" ]; then
            javap -p -classpath "$OPTIONS_JAR" net.minecraft.client.Options | grep -i -E "hide|gui|hud"
          else
            echo "Could not locate a jar containing Options.class"
          fi

          echo ""
          echo "--- Locating Gui / Hud classes ---"
          find ~/.gradle/caches/fabric-loom -name "*.jar" 2>/dev/null | while read jar; do
            MATCHES=$(unzip -l "$jar" 2>/dev/null | grep -E "net/minecraft/client/gui/(Gui|Hud)\.class")
            if [ -n "$MATCHES" ]; then
              echo "In $jar:"
              echo "$MATCHES"
            fi
          done

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: villager-reroll-jar
          path: build/libs/*.jar
